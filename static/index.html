<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Web GUI</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/vs2015.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <!-- KaTeX for Math -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            margin: 0; 
            padding: 0; 
            background-color: #f5f5f5; 
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        h1 {
            text-align: center;
            margin: 15px 0;
            flex-shrink: 0;
        }
        #chat-container { 
            background: white; 
            padding: 20px; 
            flex-grow: 1;
            overflow-y: auto;
        }
        .message { 
            margin-bottom: 15px; 
            padding: 10px; 
            border-radius: 5px; 
        }
        .system { 
            background-color: #e9ecef; 
            color: #555; 
            font-family: monospace; 
            font-size: 0.9em; 
        }
        .user { 
            background-color: #d1e7dd; 
            color: #0f5132; 
            font-weight: bold; 
        }
        .assistant { 
            background-color: #f8f9fa; 
            border: 1px solid #dee2e6; 
        }
        .tool { 
            background-color: #fff3cd; 
            color: #664d03; 
            font-family: monospace; 
            font-size: 0.9em; 
            border-left: 4px solid #ffc107; 
        }
        #input-container { 
            display: flex; 
            gap: 10px; 
            align-items: flex-end;
            padding: 20px;
            background: #f5f5f5;
            border-top: 1px solid #ddd;
            flex-shrink: 0;
        }
        textarea { 
            flex-grow: 1; 
            padding: 10px; 
            border: 1px solid #ccc; 
            border-radius: 4px; 
            font-size: 16px; 
            resize: none;
            overflow-y: hidden;
            min-height: 20px;
            max-height: 150px;
            font-family: Arial, sans-serif;
            line-height: 1.5;
        }
        button { 
            padding: 10px 20px; 
            background-color: #0d6efd; 
            color: white; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            font-size: 16px; 
            height: 44px;
        }
        button:disabled { 
            background-color: #6c757d; 
            cursor: not-allowed; 
        }
        .markdown-body p { margin-top: 0; }
        
        /* Fix highlight.js background */
        pre {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 16px;
            border-radius: 6px;
            overflow: auto;
        }
        pre code.hljs {
            background: transparent;
            padding: 0;
        }
    </style>
</head>
<body>
    <h1>Agent Web GUI</h1>
    <div id="chat-container"></div>
    <div id="input-container">
        <textarea id="prompt-input" rows="1" placeholder="Enter your prompt... (Shift+Enter for new line)">What is the weather in Haifa and based on this recommend me an activity suitable for the weather.</textarea>
        <button id="send-btn" onclick="sendPrompt()">Send</button>
    </div>

    <script>
        // Configure marked to use highlight.js
        marked.setOptions({
            highlight: function(code, lang) {
                if (lang && hljs.getLanguage(lang)) {
                    try {
                        return hljs.highlight(code, { language: lang }).value;
                    } catch (err) {}
                }
                try {
                    return hljs.highlightAuto(code).value;
                } catch (err) {}
                return code; // use external default escaping
            }
        });

        // Generate a unique session ID for this tab
        const sessionId = Math.random().toString(36).substring(2, 15);

        const input = document.getElementById('prompt-input');
        
        let abortController = null;
        let isGenerating = false;

        function setButtonState(generating) {
            const sendBtn = document.getElementById('send-btn');
            isGenerating = generating;
            if (generating) {
                sendBtn.textContent = 'Stop';
                sendBtn.style.backgroundColor = '#dc3545'; // Red color for stop
            } else {
                sendBtn.textContent = 'Send';
                sendBtn.style.backgroundColor = '#0d6efd'; // Blue color for send
            }
        }

        // Auto-grow textarea
        input.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
            if (this.scrollHeight > 150) {
                this.style.overflowY = 'auto';
            } else {
                this.style.overflowY = 'hidden';
            }
        });

        // Handle Enter key to send
        input.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                if (!isGenerating) {
                    sendPrompt();
                }
            }
        });

        async function sendPrompt() {
            if (isGenerating) {
                if (abortController) abortController.abort();
                return;
            }

            const input = document.getElementById('prompt-input');
            const sendBtn = document.getElementById('send-btn');
            const chatContainer = document.getElementById('chat-container');
            const prompt = input.value.trim();
            
            if (!prompt) return;

            // Remove any existing approval UI
            const approvalUIs = document.querySelectorAll('.approval-ui');
            approvalUIs.forEach(ui => ui.remove());

            // Disable input while processing
            input.disabled = true;
            setButtonState(true);
            abortController = new AbortController();

            // Append user message and clear input
            appendMessage('user', `User: ${prompt}`);
            input.value = '';
            input.style.height = 'auto'; // Reset height

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_id: sessionId, action: 'prompt', prompt: prompt }),
                    signal: abortController.signal
                });

                await processStream(response);
            } catch (error) {
                if (error.name === 'AbortError') {
                    appendMessage('system', `[SYSTEM] Generation stopped by user.`);
                } else {
                    appendMessage('system', `[ERROR] ${error.message}`);
                }
            } finally {
                input.disabled = false;
                setButtonState(false);
                input.focus();
            }
        }

        async function processStream(response) {
            const chatContainer = document.getElementById('chat-container');
            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = "";
            
            let currentAssistantDiv = null;
            let finalResponseText = "";

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                
                buffer += decoder.decode(value, { stream: true });
                
                let boundary = buffer.indexOf('\n\n');
                while (boundary !== -1) {
                    const message = buffer.slice(0, boundary);
                    buffer = buffer.slice(boundary + 2);
                    
                    if (message.startsWith('data: ')) {
                        const data = JSON.parse(message.substring(6));
                        
                        if (data.type === 'status') {
                            appendMessage('system', `[SYSTEM] ${data.content}`);
                        } else if (data.type === 'tool_result') {
                            appendMessage('tool', `[TOOL] ${data.content}`);
                        } else if (data.type === 'token') {
                            if (!currentAssistantDiv) {
                                appendMessage('system', `[SYSTEM] === Final Response ===`);
                                currentAssistantDiv = createMessageDiv('assistant');
                                chatContainer.appendChild(currentAssistantDiv);
                            }
                            finalResponseText += data.content;
                            currentAssistantDiv.innerHTML = marked.parse(finalResponseText);
                            
                            // Apply syntax highlighting to newly added code blocks
                            currentAssistantDiv.querySelectorAll('pre code').forEach((block) => {
                                hljs.highlightElement(block);
                            });
                            
                            // Render math formulas
                            renderMathInElement(currentAssistantDiv, {
                                delimiters: [
                                    {left: '$$', right: '$$', display: true},
                                    {left: '$', right: '$', display: false},
                                    {left: '\\(', right: '\\)', display: false},
                                    {left: '\\[', right: '\\]', display: true}
                                ],
                                throwOnError: false
                            });
                            
                            chatContainer.scrollTop = chatContainer.scrollHeight;
                        } else if (data.type === 'tool_approval_request') {
                            const toolDetails = data.tool_calls.map(tc => {
                                const args = typeof tc.function.arguments === 'string' ? tc.function.arguments : JSON.stringify(tc.function.arguments, null, 2);
                                return `${tc.function.name}(${args})`;
                            }).join('\n');
                            appendMessage('system', `[SYSTEM] The model wants to run tool:\n${toolDetails}`);
                            showApprovalUI(data.tool_calls, data.remaining_tools);
                        } else if (data.type === 'done') {
                            // Finished
                        }
                    }
                    boundary = buffer.indexOf('\n\n');
                }
            }
        }

        function showApprovalUI(toolCalls, remainingTools) {
            const chatContainer = document.getElementById('chat-container');
            const div = document.createElement('div');
            div.className = 'message system approval-ui';
            
            const text = document.createElement('p');
            text.textContent = 'Do you approve running these tools?';
            div.appendChild(text);
            
            const btnApprove = document.createElement('button');
            btnApprove.textContent = 'Approve';
            btnApprove.style.marginRight = '10px';
            btnApprove.onclick = () => handleApproval('approve_tool', toolCalls, remainingTools);
            
            const btnDeny = document.createElement('button');
            btnDeny.textContent = 'Deny';
            btnDeny.style.marginRight = '10px';
            btnDeny.style.backgroundColor = '#dc3545';
            btnDeny.onclick = () => handleApproval('deny_tool', toolCalls, remainingTools);
            
            const btnAuto = document.createElement('button');
            btnAuto.textContent = 'Auto-Approve All';
            btnAuto.style.backgroundColor = '#198754';
            btnAuto.onclick = () => handleApproval('auto_approve', toolCalls, remainingTools);
            
            div.appendChild(btnApprove);
            div.appendChild(btnDeny);
            div.appendChild(btnAuto);
            
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        async function handleApproval(action, toolCalls, remainingTools) {
            // Remove the approval UI
            const approvalUIs = document.querySelectorAll('.approval-ui');
            approvalUIs.forEach(ui => ui.remove());
            
            // Disable input
            const input = document.getElementById('prompt-input');
            input.disabled = true;
            setButtonState(true);
            abortController = new AbortController();
            
            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_id: sessionId, action: action, tool_calls: toolCalls, remaining_tools: remainingTools }),
                    signal: abortController.signal
                });
                
                await processStream(response);
            } catch (error) {
                if (error.name === 'AbortError') {
                    appendMessage('system', `[SYSTEM] Generation stopped by user.`);
                } else {
                    appendMessage('system', `[ERROR] ${error.message}`);
                }
            } finally {
                input.disabled = false;
                setButtonState(false);
                input.focus();
            }
        }

        function createMessageDiv(role) {
            const div = document.createElement('div');
            div.className = `message ${role} markdown-body`;
            return div;
        }

        function appendMessage(role, text) {
            const chatContainer = document.getElementById('chat-container');
            const div = createMessageDiv(role);
            if (role === 'assistant') {
                div.innerHTML = marked.parse(text);
                
                // Apply syntax highlighting
                div.querySelectorAll('pre code').forEach((block) => {
                    hljs.highlightElement(block);
                });
                
                renderMathInElement(div, {
                    delimiters: [
                        {left: '$$', right: '$$', display: true},
                        {left: '$', right: '$', display: false},
                        {left: '\\(', right: '\\)', display: false},
                        {left: '\\[', right: '\\]', display: true}
                    ],
                    throwOnError: false
                });
            } else {
                // Preserve newlines for user messages
                div.style.whiteSpace = 'pre-wrap';
                div.textContent = text;
            }
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
    </script>
</body>
</html>
